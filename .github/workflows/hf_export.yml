name: TEQUMSA HF Export

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  export_to_hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Stage and push export
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/export_to_hf.py --push

